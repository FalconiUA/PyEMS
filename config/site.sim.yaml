scenario:
  control_mode: export_limit
  active_power_limit_w: 100.0
  connection_point_device_id: grid
  unit_device_id: pv
  pid_tuning: auto
  export_priority: 5
  regulation_priority: 10
control:
  fast_cycle_s: 1
  poll_interval_s: 0.5
  setpoint_rewrite_s: 10
  command_json: logs/commands.json
  command_max_age_s: 30
export_limit:
  limit_w: 100.0
  priority: 5
  connection_point_active_power_channel: grid.W
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
connection_point_active_power:
  export_limit_w: 100.0
  import_limit_w: 1000000000.0
  priority: 10
  gains:
    kp: 0.4
    ki: 0.08
    kd: 0.0
    tt: 5.0
  connection_point_active_power_channel: grid.W
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
safety:
  safe_active_power_w: 0
  max_comms_age_s: 10
  unit_active_power_setpoint_channels:
  - pv.WSet
  device_comms_max_age_s:
    grid: 6
    pv: 6
  max_write_age_s: 15
  max_measurement_frozen_s: 30
  frozen_measurement_channels:
  - grid.W
  device_comms_watchdog_s: 60
allocation:
  channels:
  - setpoint_channel: pv.WSet
    p_min_w: 0
    p_max_w: 100000
    default_w: 0
    ramp_rate_w_per_s: 1000
    deadband_w: 200
    ramp_down_w_per_s: 50000
telemetry:
  live_json: logs/live_state.json
logging:
  file: logs/pyems.sim.log
devices:
- id: grid
  profile: meters/example_grid_meter.yaml
  host: 127.0.0.1
  port: 15021
  slave_id: 1
  timeout_s: 1
  retries: 1
- id: pv
  profile: inverters/sim_sun2000_switch.yaml
  host: 127.0.0.1
  port: 15022
  slave_id: 1
  timeout_s: 1
  retries: 1
setpoint_compliance:
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
  tolerance_w: 2000
  max_violation_s: 30
setpoint_headroom:
  headroom_w: 1000
  headroom_pct: 15
  priority: 11
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
recording:
  cycle_csv: logs/sim_cycles.csv
hard_switch:
  start_writes:
  - channel: pv.StartCmd
    value: 0
  stop_writes:
  - channel: pv.StopCmd
    value: 0
simulation:
  tick_s: 0.2
  meter_noise_w: 25
  unit:
    tau_s: 2
    peak_w: 100000
    period_s: 600
    noise_w: 500
  load:
    base_w: 30000
    amplitude_w: 10000
    period_s: 900
    noise_w: 100
