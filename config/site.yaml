# Site configuration — deployment-specific values for ONE installation.
# Everything here changes per site (network, setpoints, safety thresholds);
# the code does not. Device register maps stay in profiles/ (see those files).
#
# IEC 61131-3 analogy: this is the CONFIGURATION/RESOURCE binding — which
# physical devices exist, at which addresses, and the tunable parameters.

control:
  fast_cycle_s: 1.0         # TASK fast interval (safety + balance)
  poll_interval_s: 0.5      # background Modbus poll period (CachedDriver)

export_limit:
  limit_w: 50000.0          # max active power export at the connection point
  priority: 5               # grid-code compliance band (0 safety, 1-9 compliance)
  # Tag bindings (IEC VAR_INPUT/VAR_OUTPUT mapping). These name the namespaced
  # channels (<device id>.<field>) the controller reads and drives, so the same
  # controller class serves any device wiring.
  connection_point_active_power_channel: grid.W   # P at connection point (+import/-export)
  unit_active_power_channel: pv.W                  # generating-unit active power
  unit_active_power_setpoint_channel: pv.WSet      # active power setpoint to the unit

safety:
  max_comms_age_s: 2.0      # trip to safe state if data older than this
  # Generating-unit active-power setpoints the interlock caps on a stale-bus trip.
  unit_active_power_setpoint_channels:
    - pv.WSet

# Setpoint arbitration (PowerAllocator). The allocator is the SOLE writer of
# these setpoint channels: controllers post requests, it merges them by priority
# and applies the per-unit device envelope, ramp gradient and deadband here
# (formerly scattered across controllers).
allocation:
  channels:
    - setpoint_channel: pv.WSet
      p_min_w: 0.0             # device envelope lower bound
      p_max_w: 100000.0        # device envelope upper bound (RfG Maximum Capacity)
      default_w: 100000.0      # value when no request exists (PV: run free)
      ramp_rate_w_per_s: 5000.0
      deadband_w: 200.0

# Field devices on this site. profile = path under profiles/ (the register map).
# id = instance namespace: it replaces the profile's class prefix so identical
# devices get unique tags (id 'pv1' → pv1.W, pv1.WSet). Omit id to keep the
# profile-local names verbatim.
devices:
  - id: grid
    profile: meters/example_grid_meter.yaml
    host: 192.168.1.200
    slave_id: 1
  - id: pv
    profile: inverters/huawei_sun2000_100ktl_m1.yaml
    host: 192.168.1.100
    slave_id: 1
