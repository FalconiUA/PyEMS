scenario:
  control_mode: export_limit
  active_power_limit_w: 100.0
  connection_point_device_id: grid
  unit_device_id: pv
  pid_tuning: auto
  export_priority: 5
  regulation_priority: 10
control:
  fast_cycle_s: 1
  poll_interval_s: 0.5
export_limit:
  limit_w: 100.0
  priority: 5
  connection_point_active_power_channel: grid.W
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
connection_point_active_power:
  export_limit_w: 100.0
  import_limit_w: 1000000000.0
  priority: 10
  gains:
    kp: 0.4
    ki: 0.08
    kd: 0.0
    tt: 5.0
  connection_point_active_power_channel: grid.W
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
safety:
  max_comms_age_s: 10
  unit_active_power_setpoint_channels:
  - pv.WSet
allocation:
  channels:
  - setpoint_channel: pv.WSet
    p_min_w: 0
    p_max_w: 100000
    default_w: 100000
    ramp_rate_w_per_s: 100
    deadband_w: 200
    ramp_down_w_per_s: 1000
telemetry:
  live_json: logs/live_state.json
devices:
- id: grid
  profile: meters/grid_meter_huawei_smartlogger3000.yaml
  host: 192.168.1.200
  port: 11
  slave_id: 1
- id: pv
  profile: inverters/huawei_sun2000_100ktl_m1.yaml
  host: 192.168.1.100
  port: 0
  slave_id: 1
setpoint_compliance:
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
  tolerance_w: 2000
  max_violation_s: 30
setpoint_headroom:
  headroom_w: 10000
  headroom_pct: 0
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet
