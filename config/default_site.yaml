scenario:
  control_mode: export_limit
  active_power_limit_w: 50000.0
  connection_point_device_id: grid
  unit_device_id: pv
  pid_tuning: auto
  export_priority: 5
  regulation_priority: 10

control:
  fast_cycle_s: 1.0
  poll_interval_s: 0.5

export_limit:
  limit_w: 50000.0
  priority: 5
  connection_point_active_power_channel: grid.W
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet

connection_point_active_power:
  export_limit_w: 50000.0
  import_limit_w: 100000.0
  priority: 10
  gains:
    kp: 0.4
    ki: 0.08
    kd: 0.0
    tt: 5.0
  connection_point_active_power_channel: grid.W
  unit_active_power_channel: pv.W
  unit_active_power_setpoint_channel: pv.WSet

safety:
  safe_active_power_w: 0.0
  max_comms_age_s: 2.0
  # Optional per-device read-freshness guard. Keys are device ids from
  # `devices`; values are seconds. Omit to use only the global comms age.
  # device_comms_max_age_s:
  #   grid: 6.0
  #   pv: 6.0
  unit_active_power_setpoint_channels:
    - pv.WSet

allocation:
  channels:
    - setpoint_channel: pv.WSet
      p_min_w: 0.0
      p_max_w: 100000.0
      default_w: 100000.0
      ramp_rate_w_per_s: 5000.0
      deadband_w: 200.0

# Live-state snapshot for the read-only UI realtime view: one JSON document
# rewritten atomically each control cycle. pyems-ui polls it off the filesystem
# rather than opening its own Modbus session. Omit to disable; relative paths
# resolve against the repo root.
telemetry:
  live_json: logs/live_state.json

# Rotating log file the EMS writes (in addition to stderr/journal); the web UI
# reads it on the Logs page so faults can be diagnosed without journalctl/SSH.
# Set file to null to disable. Relative paths resolve against the repo root.
logging:
  file: logs/pyems.log

devices:
  # Per device you may set `timeout_s` and `retries` (both protocols) to bound
  # the worst-case poll time — a hung device costs ~(retries+1)*timeout_s per
  # poll. Left unset here (pymodbus defaults ~3 s x 4); production sites should
  # set them explicitly (see config/site.yaml for the arithmetic).
  - id: grid
    profile: meters/example_grid_meter.yaml
    host: 192.168.1.200
    slave_id: 1
  - id: pv
    profile: inverters/huawei_sun2000_100ktl_m1.yaml
    host: 192.168.1.100
    slave_id: 1
