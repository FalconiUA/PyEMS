model: Example Grid Meter
protocol: modbus_tcp
default_port: 502
registers:
# min/max = plausibility bounds: a decoded value outside them fails the poll
# (comms age grows) instead of entering the control loop as a measurement.
- channel: grid.W
  address: 40001
  type: int32
  scale: 1
  unit: W
  access: read
  min_val: -10000000
  max_val: 10000000
- channel: grid.WphA
  address: 40003
  type: int32
  scale: 1
  unit: W
  access: read
- channel: grid.WphB
  address: 40005
  type: int32
  scale: 1
  unit: W
  access: read
- channel: grid.WphC
  address: 40007
  type: int32
  scale: 1
  unit: W
  access: read
- channel: grid.VAR
  address: 40009
  type: int32
  scale: 1
  unit: VAr
  access: read
- channel: grid.VARphA
  address: 40011
  type: int32
  scale: 1
  unit: VAr
  access: read
- channel: grid.VARphB
  address: 40013
  type: int32
  scale: 1
  unit: VAr
  access: read
- channel: grid.VARphC
  address: 40015
  type: int32
  scale: 1
  unit: VAr
  access: read
- channel: grid.VA
  address: 40017
  type: int32
  scale: 1
  unit: VA
  access: read
- channel: grid.VAphA
  address: 40019
  type: int32
  scale: 1
  unit: VA
  access: read
- channel: grid.VAphB
  address: 40021
  type: int32
  scale: 1
  unit: VA
  access: read
- channel: grid.VAphC
  address: 40023
  type: int32
  scale: 1
  unit: VA
  access: read
- channel: grid.Hz
  address: 40025
  type: uint16
  scale: 0.01
  unit: Hz
  access: read
- channel: grid.AphA
  address: 40027
  type: int32
  scale: 0.001
  unit: A
  access: read
- channel: grid.AphB
  address: 40029
  type: int32
  scale: 0.001
  unit: A
  access: read
- channel: grid.AphC
  address: 40031
  type: int32
  scale: 0.001
  unit: A
  access: read
- channel: grid.PhVphA
  address: 40033
  type: uint16
  scale: 0.1
  unit: V
  access: read
- channel: grid.PhVphB
  address: 40035
  type: uint16
  scale: 0.1
  unit: V
  access: read
- channel: grid.PhVphC
  address: 40037
  type: uint16
  scale: 0.1
  unit: V
  access: read
